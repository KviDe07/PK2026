# ============================================================================
#  Параметры сделок воронки бакалавриата.
#  Поля сделки создаются командой `admissions setup-deal-fields --apply`;
#  их коды резолвятся по XML_ID в рантайме (см. bitrix_fields.py).
# ============================================================================

# Категория (воронка) сделок.
category_id: 8

# Поля, которыми владеет ОПЕРАТОР — синхронизация их никогда не перезаписывает.
operator_protected:
  - STAGE_ID   # стадия воронки (оператор двигает вручную)
  - TITLE      # заголовок сделки
