# ============================================================================
#  Маппинг выгрузки СУПЕРСЕРВИСА «Поступление в вуз онлайн» (ЕПГУ), .xlsx.
#  Альтернативный источник заявлений (кроме 1С). Ключевые отличия:
#    * шапка таблицы — в ПЕРВОЙ строке (в 1С — многострочная);
#    * свои названия колонок и свои значения категорий → приводим к терминам 1С
#      (конкурсная группа / основание / особенности) таблицами соответствий ниже;
#    * файл ОБЩЕВУЗОВСКИЙ (все программы МФТИ) → берём только строки наших
#      конкурсных групп (group_map = одновременно фильтр «наши/не наши»);
#    * БАЛЛОВ НЕТ: поля баллов остаются пустыми и дозаполняются позже из 1С;
#    * согласие = подано очно ИЛИ онлайн; отозванность = колонка «Актуальность».
# ============================================================================

# Колонки файла суперсервиса (левое — внутренний атрибут, правое — колонка файла).
columns:
  code:            "Уникальный код поступающего"
  full_name:       "ФИО"
  email:           "Почта"
  phone:           "Телефон"
  program:         "Обр.программа"
  basis:           "Вид заявления"
  places:          "Вид мест"
  priority:        "Приоритет"
  app_date:        "Дата регистрации"
  consent_offline: "Согласие подано очно"
  consent_online:  "Согласие подано онлайн"
  actuality:       "Актуальность"

# Обр.программа (суперсервис) -> Конкурсная группа (термины 1С/Битрикса).
# ОДНОВРЕМЕННО фильтр ФАКТ: строки с программой не из этого списка игнорируются
# (в файле — все программы МФТИ, нам нужны только магистерские КГ ФАКТ).
group_map:
  "Компьютерное моделирование физических процессов; Космические технологии; Фундаментальная и прикладная физика природных систем": "Аэрокосмические технологии"
  "Системный анализ и управление в больших системах": "Системный анализ и управление"
  "Техническая физика космических летательных аппаратов": "Техническая физика"

# Вид заявления -> Основание поступления (термины 1С).
# «Платные мест» — так значение записано в выгрузке (без «а»); дублируем на случай
# исправления опечатки в источнике.
basis_map:
  "Бюджетные места":  "Бюджетная основа"
  "Платные мест":     "Полное возмещение затрат"
  "Платные места":    "Полное возмещение затрат"

# Вид мест -> Особенности приёма (термины 1С).
features_map:
  "Основные места в рамках КЦП":     "Общие места"
  "Платные места":                   "Общие места"
  "Целевая детализированная квота":  "Отдельная квота"

# Значение колонки «Актуальность», означающее отозванное заявление.
withdrawn_value: "Отозвано"
