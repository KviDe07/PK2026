# ============================================================================
#  Маппинг выгрузки 1С -> канонические поля карточки абитуриента.
#  Слева — каноническое имя поля (используется внутри системы),
#  справа — название колонки в Excel/CSV выгрузке из 1С.
#
#  Подгоните правую часть под реальные заголовки: запустите
#      python -m admissions inspect data/input/<файл>.xlsx
#  и впишите точные названия колонок.
# ============================================================================

# Имя листа Excel (null = первый лист). Для CSV игнорируется.
sheet: null

# Поле-идентификатор записи внутри 1С -> сохраняется как onec_id.
id_field: "Номер заявления"

# Поле «сырого» статуса -> приводится к каноническому через status_mapping.
status_field: "Статус заявления"

# Соответствие канонических полей колонкам выгрузки.
fields:
  last_name:       "Фамилия"
  first_name:      "Имя"
  middle_name:     "Отчество"
  birth_date:      "Дата рождения"
  email:           "Email"
  phone:           "Телефон"
  snils:           "СНИЛС"
  passport:        "Паспорт"
  education_doc:   "Документ об образовании"
  program:         "Направление подготовки"
  education_form:  "Форма обучения"
  funding_basis:   "Основа обучения"
  total_score:     "Сумма баллов"
  consent:         "Согласие на зачисление"
