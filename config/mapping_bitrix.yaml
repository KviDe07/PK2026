# ============================================================================
#  Маппинг полей Битрикс24 -> канонические поля карточки абитуриента.
#  Слева — каноническое имя поля, справа — код поля в Битрикс24.
#
#  Какая сущность хранит абитуриентов и коды полей (особенно UF_CRM_*)
#  уточняются на этапе разведки:
#      python -m admissions inspect --bitrix
#  выведет доступные поля выбранной сущности.
# ============================================================================

# Сущность CRM: lead | deal | contact
entity: lead

# Какие поля запрашивать (пусто = все). Перечислите коды, чтобы ускорить выгрузку.
select: []

# Фильтр выборки (формат фильтра Битрикс24), напр. {"CATEGORY_ID": "0"}.
filter: {}

# Поле-идентификатор записи в Битриксе -> сохраняется как bitrix_id.
id_field: "ID"

# Поле «сырого» статуса/стадии -> приводится к каноническому через status_mapping.
# Для lead это обычно STATUS_ID, для deal — STAGE_ID.
status_field: "STATUS_ID"

# Соответствие канонических полей кодам полей Битрикса.
# UF_CRM_* — пользовательские поля, их реальные коды смотрите через inspect.
fields:
  last_name:       "LAST_NAME"
  first_name:      "NAME"
  middle_name:     "SECOND_NAME"
  birth_date:      "BIRTHDATE"
  email:           "EMAIL"          # в Битриксе часто список — берётся первое значение
  phone:           "PHONE"          # аналогично
  snils:           "UF_CRM_SNILS"
  passport:        "UF_CRM_PASSPORT"
  education_doc:   "UF_CRM_EDU_DOC"
  program:         "UF_CRM_PROGRAM"
  education_form:  "UF_CRM_EDU_FORM"
  funding_basis:   "UF_CRM_FUNDING"
  total_score:     "UF_CRM_SCORE"
  consent:         "UF_CRM_CONSENT"
