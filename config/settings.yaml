# ============================================================================
#  Настройки системы учёта абитуриентов ФАКТ МФТИ
#  Это значения по умолчанию. На этапе разведки (Milestone 1) подгоните под
#  реальные выгрузки: запустите `inspect` и скорректируйте маппинги/статусы.
# ============================================================================

# Пути (относительно корня проекта admissions/)
paths:
  db: data/db/applicants.sqlite
  input_dir: data/input
  output_dir: data/output

# --------------------------------------------------------------------------
#  Стратегия сопоставления записей 1С <-> Битрикс (каскад).
#  Проверяются по порядку; первое уверенное совпадение выигрывает.
# --------------------------------------------------------------------------
matching:
  cascade:
    # 1) Явный общий идентификатор. Укажите каноническое поле, если в обеих
    #    выгрузках есть один и тот же ID (напр. номер заявления). Иначе оставьте пустым.
    - method: exact_id
      fields: []            # напр. ["application_no"] или ["snils"]
    # 2) Точное совпадение по нормализованным контактам.
    - method: exact_contact
      fields: ["email", "phone"]
    # 3) Нечёткое ФИО + дата рождения.
    - method: fuzzy_name_dob
      name_threshold: 90     # 0..100, порог схожести ФИО (rapidfuzz)
      require_dob_match: true # требовать точного совпадения даты рождения
  # Порог, ниже которого совпадение считается неоднозначным и уходит в review_needed.
  review_threshold: 75
  # Если кандидатов с похожим скором несколько — не сливать, отправить в review.
  ambiguity_margin: 5

# --------------------------------------------------------------------------
#  Канонические статусы абитуриента (по порядку воронки набора).
#  raw-статусы из источников приводятся к этим через status_mapping ниже.
# --------------------------------------------------------------------------
statuses:
  order:
    - lead              # заявка/интерес (обычно из Битрикса)
    - documents_submitted   # документы поданы
    - under_review      # на проверке
    - admitted_to_exams # допущен к вступительным
    - passed            # прошёл по конкурсу
    - consent_given     # подал согласие на зачисление
    - enrolled          # зачислен
    - rejected          # отказ / не прошёл
    - withdrawn         # забрал документы
  default: lead

# Приведение «сырых» значений статуса к каноническим. Ключи — в нижнем регистре.
# Слева — как может прийти из источника, справа — канонический статус.
status_mapping:
  "новый": lead
  "лид": lead
  "заявка": lead
  "в обработке": under_review
  "документы поданы": documents_submitted
  "поданы документы": documents_submitted
  "на проверке": under_review
  "на рассмотрении": under_review
  "допущен": admitted_to_exams
  "допущен к экзаменам": admitted_to_exams
  "прошёл": passed
  "прошел по конкурсу": passed
  "согласие": consent_given
  "подал согласие": consent_given
  "зачислен": enrolled
  "отказ": rejected
  "не прошёл": rejected
  "забрал документы": withdrawn
  "отозвал": withdrawn

# --------------------------------------------------------------------------
#  Проверка комплектности документов.
#  Поля проверяются на «непустоту» в карточке абитуриента. Если поле пустое —
#  документ считается недостающим и попадёт в отчёты.
# --------------------------------------------------------------------------
documents:
  required_fields:
    - passport         # паспортные данные
    - snils            # СНИЛС
    - education_doc    # документ об образовании (аттестат/диплом)
    - consent          # согласие на зачисление
  # На каком статусе и выше документы становятся обязательными.
  required_from_status: documents_submitted

# При слиянии: какому источнику доверять больше при конфликте значений поля.
# Порядок = приоритет (первый побеждает).
source_priority:
  - "1c"
  - "bitrix"
