# ============================================================================
#  Настройки системы учёта абитуриентов ФАКТ МФТИ (ПК-2026).
#  Утилита stateless: читает выгрузку 1С и пишет напрямую в Битрикс24.
# ============================================================================

# Пути (относительно корня проекта admissions/)
paths:
  input_dir: data/input
  output_dir: data/output

# Воронка (категория сделок) бакалавриата в Битриксе.
bakalavriat_category_id: 8

# Стандартный «Тип контакта» Битрикса (TYPE_ID) для этой воронки.
# CLIENT = Абитуриенты, SUPPLIER = Магистры, PARTNER = Аспиранты.
contact_type_id: "CLIENT"

# Уровни поступления (для веб-приложения). Активен только тот, где enabled: true.
# Задел: магистратура/аспирантура включим, когда заведём их воронки и поля в Битриксе.
levels:
  bachelor:
    title: "Базовое высшее (бакалавриат)"
    enabled: true
  master:
    title: "Магистратура"
    enabled: false
  postgrad:
    title: "Аспирантура"
    enabled: false

# Код стадии для новых сделок (null = первая стадия воронки по порядку).
default_stage_id: null

# Автоматические стадии (по названию стадии воронки):
#   on_application — заявление пришло, контакта раньше не было (новая сделка);
#   on_contacted  — была пустая сделка оператора (контакт был) и пришло заявление.
# Перенос только «вперёд» — ручной прогресс оператора не откатывается.
stages:
  on_application: "Поступившие заявления"
  on_contacted: "Связались"
  # отозванные заявления (сделка есть, но её нет в новой выгрузке) → сюда.
  # Пусто/убрать строку = только отчёт, без авто-переноса.
  on_withdrawn: "Отозвал заявление"
